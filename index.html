<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5학년 사회 대륙 대양 탐험 교구</title>
    <!-- 폭죽 효과 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --ocean-color: #2563eb;
            --continent-color: #ea580c;
            --bg-light: #f8fafc;
            --slate-800: #1e293b;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { text-align: center; margin-bottom: 15px; }
        h1 { color: var(--slate-800); margin: 0 0 5px 0; font-size: 1.6rem; }
        .subtitle { color: #64748b; margin: 0; font-size: 0.95rem; }

        .status-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
            font-weight: bold;
            font-size: 1rem;
        }
        .score-box { background: #e2e8f0; padding: 6px 16px; border-radius: 20px; color: #334155; }

        /* 고화질 실제 백지도 보드 */
        .map-board {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            background-image: url('https://i.ibb.co/680Ld4Z/world-blank-map.png'); /* 실제 정밀 해안선 백지도 연동 */
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border: 4px solid #ffffff;
        }

        /* 반응형 위치 핀 */
        .pin {
            position: absolute;
            width: 32px;
            height: 32px;
            border: 2.5px solid #ffffff;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .pin.unsolved { background-color: #475569 !important; animation: blink 1.5s infinite; }
        .pin.continent { background-color: var(--continent-color); }
        .pin.ocean { background-color: var(--ocean-color); }
        .pin:hover { transform: translate(-50%, -50%) scale(1.25); z-index: 5; }

        /* 퀴즈 모달 팝업 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 10;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 16px;
            width: 85%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
        }
        .modal-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; color: #0f172a; }
        .guide-box {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.88rem;
            color: #166534;
            margin-bottom: 12px;
            line-height: 1.4;
            text-align: left;
        }
        .quiz-text { font-size: 1.05rem; font-weight: bold; color: #2563eb; margin-bottom: 10px; }
        .quiz-hint { font-size: 1.3rem; letter-spacing: 4px; font-weight: bold; color: #dc2626; margin-bottom: 15px; }
        .choice-container { display: flex; flex-direction: column; gap: 8px; }
        .choice-btn {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            padding: 11px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .choice-btn:hover { background: #e2e8f0; }

        /* 성찰 일지 코너 */
        .reflection-panel {
            width: 100%;
            max-width: 900px;
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 2px solid #e2e8f0;
            box-sizing: border-box;
        }
        .reflection-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #0f172a;
            margin-bottom: 10px;
            border-left: 4px solid #ea580c;
            padding-left: 8px;
        }
        .reflection-q { font-size: 0.95rem; color: #334155; margin-bottom: 12px; line-height: 1.5; background: #fff7ed; padding: 10px; border-radius: 8px; }
        textarea {
            width: 100%;
            height: 80px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 10px;
            font-size: 0.95rem;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        .submit-btn {
            background: #0f172a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
        }
        .submit-btn:hover { background: #1e293b; }

        @keyframes blink {
            0% { box-shadow: 0 0 0 0 rgba(71, 85, 105, 0.6); }
            70% { box-shadow: 0 0 0 10px rgba(71, 85, 105, 0); }
            100% { box-shadow: 0 0 0 0 rgba(71, 85, 105, 0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>🗺️ 실제 지도로 배우는 세계 대륙과 대양 탐험</h1>
        <p class="subtitle">정밀한 해안선 백지도를 관찰하며 질문을 해결하고 미션을 완료해 보세요!</p>
    </header>

    <div class="status-bar">
        <div class="score-box">내 점수: <span id="score">0</span> / 110점</div>
    </div>

    <!-- 실제 백지도 이미지 배경 기반 보드 -->
    <div class="map-board">
        <!-- 대륙 핀 위치 재조정 (실제 지도 좌표 맞춤) -->
        <div class="pin unsolved" data-id="asia" style="top: 28%; left: 73%;">?</div>
        <div class="pin unsolved" data-id="europe" style="top: 24%; left: 51%;">?</div>
        <div class="pin unsolved" data-id="africa" style="top: 55%; left: 51%;">?</div>
        <div class="pin unsolved" data-id="na" style="top: 28%; left: 21%;">?</div>
        <div class="pin unsolved" data-id="sa" style="top: 68%; left: 32%;">?</div>
        <div class="pin unsolved" data-id="oceania" style="top: 70%; left: 83%;">?</div>
        
        <!-- 대양 핀 위치 재조정 -->
        <div class="pin unsolved" data-id="pacific1" style="top: 45%; left: 6%;">?</div>
        <div class="pin unsolved" data-id="pacific2" style="top: 45%; left: 94%;">?</div>
        <div class="pin unsolved" data-id="atlantic" style="top: 46%; left: 39%;">?</div>
        <div class="pin unsolved" data-id="indian" style="top: 60%; left: 66%;">?</div>
        <div class="pin unsolved" data-id="arctic" style="top: 7%; left: 50%;">?</div>
        <div class="pin unsolved" data-id="antarctic" style="top: 92%; left: 50%;">?</div>
    </div>

    <!-- 성찰 일지 코너 -->
    <div class="reflection-panel">
        <div class="reflection-title">✏️ 학생 눈으로 내가 만든 도구 살펴보는 성찰일지</div>
        <div class="reflection-q">
            <strong>🤔 오늘 나의 성찰질문:</strong><br>
            "이 지도 교구는 처음 학습하는 친구들이 참여했을 때 평면 지도와 입체 지구본의 크기 왜곡 차이를 한눈에 쉽게 이해할 수 있도록 정교하게 구성되어 있는가? 오늘 활동을 통해 깨달은 점을 적어봅시다."[cite: 1]
        </div>
        <textarea id="reflectionText" placeholder="여기에 성찰 기록을 작성하세요... (예: 실제 세밀한 지도로 관찰하니 왜곡된 북극해의 크기나 아프리카 대륙의 진짜 형태를 직관적으로 비교할 수 있어 유익했습니다.)"></textarea>
        <button class="submit-btn" onclick="saveReflection()">성찰 기록 인쇄 / PDF 저장하기</button>
    </div>

    <!-- 퀴즈 팝업창 -->
    <div class="modal" id="quizModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">탐험 퀴즈</div>
            <div class="guide-box" id="modalGuide">힌트</div>
            <div class="quiz-text" id="modalQuestion">올바른 명칭은 무엇일까요?</div>
            <div class="quiz-hint" id="modalHint">초성</div>
            <div class="choice-container" id="modalChoices"></div>
        </div>
    </div>

    <script>
        const quizData = {
            asia: { title: "대륙 탐험", type: "continent", hint: "ㅇㅅㅇ", ans: "아시아", guide: "💡 유럽의 동쪽에 있으며, 실제 지구상에서 가장 면적이 넓은 거대한 대륙입니다."[cite: 1], choices: ["아시아", "오세아니아", "아프리카", "유럽"] },
            europe: { title: "대륙 탐험", type: "continent", hint: "ㅇㄹ", ans: "유럽", guide: "💡 아시아의 서쪽, 아프리카의 북쪽에 긴밀하게 붙어 있는 대륙입니다."[cite: 1], choices: ["유럽", "아시아", "북아메리카", "남아메리카"] },
            africa: { title: "대륙 탐험 (면적 왜곡 주의!)", type: "continent", hint: "ㅇㅍㄹㅋ", ans: "아프리카", guide: "⚠️ 중요(지도서 410쪽 지침): 평면 지도에선 북아메리카와 크기가 비슷해 보이지만, 실제 입체 지구본으로 보면 아프리카가 훨씬 큽니다!"[cite: 1], choices: ["아프리카", "남아메리카", "북아메리카", "유럽"] },
            na: { title: "대륙 탐험 (면적 왜곡 주의!)", type: "continent", hint: "ㅂㅇㅁㄹㅋ", ans: "북아메리카", guide: "⚠️ 중요: 평면 지도에서는 고위도 그린란드나 캐나다 영토가 실제보다 크게 확대되어 보입니다. 남아메리카의 북쪽에 있습니다."[cite: 1], choices: ["북아메리카", "남아메리카", "아시아", "아프리카"] },
            sa: { title: "대륙 탐험", type: "continent", hint: "ㄴㅇㅁㄹㅋ", ans: "남아메리카", guide: "💡 북아메리카의 남쪽에 삼각형 모양으로 뻗어 있으며, 대서양과 태평양 사이에 위치합니다."[cite: 1], choices: ["남아메리카", "북아메리카", "오세아니아", "아프리카"] },
            oceania: { title: "대륙 탐험", type: "continent", hint: "ㅇㅅㅇㄴㅇ", ans: "오세아니아", guide: "💡 아시아의 남동쪽에 위치하며, 6대륙 중 가장 면적이 작은 대륙입니다."[cite: 1], choices: ["오세아니아", "아시아", "유럽", "남아메리카"] },
            pacific1: { title: "대양 탐험", type: "ocean", hint: "ㅌㅍㅇ", ans: "태평양", guide: "💡 아시아 대륙과 아메리카 대륙 사이에 있는 세계에서 가장 넓고 거대한 바다입니다."[cite: 1], choices: ["태평양", "대서양", "인도양", "북극해"] },
            pacific2: { title: "대양 탐험", type: "ocean", hint: "ㅌㅍㅇ", ans: "태평양", guide: "💡 아시아 대륙과 아메리카 대륙 사이에 있는 세계에서 가장 넓고 거대한 바다입니다."[cite: 1], choices: ["태평양", "대서양", "인도양", "북극해"] },
            atlantic: { title: "대양 탐험", type: "ocean", hint: "ㄷㅅㅇ", ans: "대서양", guide: "💡 아메리카 대륙과 유럽, 아프리카 대륙 사이에 끼어 있는 두 번째로 큰 바다입니다."[cite: 1], choices: ["대서양", "태평양", "인도양", "남극해"] },
            indian: { title: "대양 탐험", type: "ocean", hint: "ㅇㄷㅇ", ans: "인도양", guide: "💡 아시아, 아프리카, 오세아니아 대륙 사이에 오목하게 자리 잡은 세 번째로 큰 바다입니다."[cite: 1], choices: ["인도양", "대서양", "태평양", "북극해"] },
            arctic: { title: "대양 탐험 (지도의 왜곡!)", type: "ocean", hint: "ㅂㄱㅎ", ans: "북극해", guide: "⚠️ 중요: 평면 세계지도 가장 윗부분에 길게 늘어나 보이지만, 실제로는 북극점 주변을 동그랗게 둘러싼 바다입니다."[cite: 1], choices: ["북극해", "남극해", "대서양", "태평양"] },
            antarctic: { title: "대양 탐험 (지도의 왜곡!)", type: "ocean", hint: "ㄴㄱㅎ", ans: "남극해", guide: "⚠️ 중요: 평면 지도 맨 아래쪽에 가로로 길게 표시되지만, 실제로는 남극 대륙을 둥글게 감싸고 있는 독립된 바다입니다."[cite: 1], choices: ["남극해", "북극해", "인도양", "대서양"] }
        };

        let currentScore = 0;
        let activePin = null;

        document.querySelectorAll('.pin').forEach(pin => {
            pin.addEventListener('click', function() {
                const id = this.getAttribute('data-id');
                const data = quizData[id];
                if (!data || !this.classList.contains('unsolved')) return;

                activePin = this;
                document.getElementById('modalTitle').innerText = data.title;
                document.getElementById('modalGuide').innerHTML = data.guide;
                document.getElementById('modalHint').innerText = data.hint;
                
                const choiceContainer = document.getElementById('modalChoices');
                choiceContainer.innerHTML = '';
                
                data.choices.forEach(choice => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.innerText = choice;
                    btn.onclick = () => checkAnswer(choice, data.ans);
                    choiceContainer.appendChild(btn);
                });

                document.getElementById('quizModal').style.display = 'flex';
            });
        });

        function checkAnswer(selected, correct) {
            document.getElementById('quizModal').style.display = 'none';
            
            if (selected === correct) {
                currentScore += 10;
                document.getElementById('score').innerText = currentScore;
                
                const currentId = activePin.getAttribute('data-id');
                if (currentId === 'pacific1' || currentId === 'pacific2') {
                    document.querySelectorAll('[data-id="pacific1"], [data-id="pacific2"]').forEach(p => revealPin(p, quizData[currentId]));
                } else {
                    revealPin(activePin, quizData[currentId]);
                }

                if (currentScore >= 110) {
                    confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
                    setTimeout(() => { alert("🎉 대단해요! 실제 정밀 지도를 바탕으로 5대양 6대륙 미션을 완벽히 완료했습니다!"); }, 500);
                }
            } else {
                alert("❌ 다시 한 번 지형의 위치와 힌트를 조합해 보세요!");
            }
        }

        function revealPin(pinElement, data) {
            pinElement.classList.remove('unsolved');
            pinElement.classList.add(data.type);
            pinElement.innerText = data.ans[0];
        }

        function saveReflection() {
            const text = document.getElementById('reflectionText').value;
            if(!text.trim()) {
                alert("성찰 기록 내용을 입력한 후에 인쇄를 진행해 주세요.");
                return;
            }
            window.print();
        }
    </script>
</body>
</html>
