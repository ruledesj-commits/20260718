<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6학년 사회 대륙 대양 탐험 교구</title>
    <!-- 폭죽 효과 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --ocean-color: #2563eb;
            --continent-color: #ea580c;
            --bg-light: #f8fafc;
            --slate-800: #1e293b;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { text-align: center; margin-bottom: 15px; }
        h1 { color: var(--slate-800); margin: 0 0 5px 0; font-size: 1.6rem; }
        .subtitle { color: #64748b; margin: 0; font-size: 0.95rem; }

        .status-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
            font-weight: bold;
            font-size: 1rem;
        }
        .score-box { background: #e2e8f0; padding: 6px 16px; border-radius: 20px; color: #334155; }

        /* 지도 보드 */
        .map-board {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 960 / 540;
            background-color: #bae6fd;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 3px solid #ffffff;
        }

        .base-map { width: 100%; height: 100%; display: block; }

        /* 반응형 핀 */
        .pin {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: all 0.2s ease;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.85rem;
        }
        .pin.unsolved { background-color: #64748b !important; animation: blink 1.5s infinite; }
        .pin.continent { background-color: var(--continent-color); }
        .pin.ocean { background-color: var(--ocean-color); }
        .pin:hover { transform: translate(-50%, -50%) scale(1.2); }

        /* 퀴즈 모달 팝업 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 10;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 16px;
            width: 85%;
            max-width: 440px;
            text-align: center;
        }
        .modal-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; color: #0f172a; }
        .guide-box {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #166534;
            margin-bottom: 12px;
            line-height: 1.4;
            text-align: left;
        }
        .quiz-text { font-size: 1rem; font-weight: bold; color: #2563eb; margin-bottom: 10px; }
        .quiz-hint { font-size: 1.3rem; letter-spacing: 3px; font-weight: bold; color: #dc2626; margin-bottom: 15px; }
        .choice-container { display: flex; flex-direction: column; gap: 8px; }
        .choice-btn {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
        }
        .choice-btn:hover { background: #e2e8f0; }

        /* 성찰 일지 코너 */
        .reflection-panel {
            width: 100%;
            max-width: 900px;
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 2px solid #e2e8f0;
            box-sizing: border-box;
        }
        .reflection-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #0f172a;
            margin-bottom: 10px;
            border-left: 4px solid #ea580c;
            padding-left: 8px;
        }
        .reflection-q { font-size: 0.95rem; color: #334155; margin-bottom: 12px; line-height: 1.5; background: #fff7ed; padding: 10px; border-radius: 8px; }
        textarea {
            width: 100%;
            height: 80px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 10px;
            font-size: 0.95rem;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        .submit-btn {
            background: #0f172a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
        }
        .submit-btn:hover { background: #1e293b; }

        @keyframes blink {
            0% { box-shadow: 0 0 0 0 rgba(100, 116, 139, 0.6); }
            70% { box-shadow: 0 0 0 10px rgba(100, 116, 139, 0); }
            100% { box-shadow: 0 0 0 0 rgba(100, 116, 139, 0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>🗺️ 실제 지형으로 배우는 세계 대륙과 대양</h1>
        <p class="subtitle">실제 지형의 해안선을 확인하며 퀴즈를 풀고 만점에 도전해 보세요!</p>
    </header>

    <div class="status-bar">
        <div class="score-box">내 점수: <span id="score">0</span> / 110점</div>
    </div>

    <div class="map-board">
        <svg class="base-map" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg">
            <rect width="960" height="540" fill="#bae6fd"/>
            <!-- 적도선 가이드 -->
            <line x1="0" y1="270" x2="960" y2="270" stroke="#7dd3fc" stroke-width="2" stroke-dasharray="4"/>
            
            <!-- 실제 정교한 세계 지형 실루엣 (로빈슨 도법 기반 표준 윤곽 패스) -->
            <!-- 유라시아 (아시아 + 유럽) -->
            <path d="M420,130 L450,110 L440,90 L480,80 L520,70 L580,75 L640,65 L720,70 L820,75 L880,100 L910,130 L900,160 L850,180 L880,220 L840,240 L810,210 L780,250 L750,230 L730,290 L710,270 L680,310 L640,310 L610,270 L580,290 L560,250 L520,240 L490,210 L450,220 L440,190 L410,170 L400,150 Z" fill="#a78bfa" opacity="0.85"/>
            <!-- 유럽 구분선 강조용 덮개 색상 -->
            <path d="M420,130 L450,110 L440,90 L480,80 L520,70 L530,120 L550,160 L520,180 L490,210 L450,220 L440,190 L410,170 Z" fill="#34d399" opacity="0.85"/>
            <!-- 아프리카 실제 지형 구조 -->
            <path d="M420,180 L470,175 L510,190 L530,220 L510,250 L530,290 L510,340 L500,410 L480,440 L460,450 L450,420 L425,350 L400,310 L390,290 L370,250 L365,220 L390,190 Z" fill="#fb923c" opacity="0.85"/>
            <!-- 북아메리카 실제 지형 구조 (알래스카 및 캐나다 제도 포함) -->
            <path d="M60,110 L90,100 L120,75 L160,80 L200,60 L240,65 L290,55 L350,75 L330,120 L290,140 L300,170 L280,210 L250,240 L260,270 L230,280 L210,260 L200,220 L160,200 L140,160 L100,160 L70,140 Z" fill="#f87171" opacity="0.85"/>
            <!-- 남아메리카 실제 지형 구조 (베네수엘라~혼곶 패턴) -->
            <path d="M210,260 L240,265 L270,280 L310,300 L330,330 L310,370 L290,410 L270,460 L250,510 L240,530 L235,510 L230,450 L210,390 L190,340 L180,300 L195,275 Z" fill="#fbbf24" opacity="0.85"/>
            <!-- 오세아니아 (오스트레일리아 대륙 중심 정교화) -->
            <path d="M690,360 L730,340 L760,335 L810,350 L840,370 L830,410 L810,430 L760,440 L720,430 L700,400 Z" fill="#f472b6" opacity="0.85"/>
            <!-- 주요 부속 도서 (그린란드, 마다가스카르, 영국, 일본, 뉴질랜드 등 실제 지형 가이드 배치) -->
            <rect x="345" y="45" width="40" height="60" rx="10" fill="#cbd5e1" opacity="0.7"/> <!-- 그린란드 -->
            <path d="M525,360 L540,390 L530,420 Z" fill="#fb923c" opacity="0.85"/> <!-- 마다가스카르 -->
            <circle cx="395" cy="125" r="10" fill="#34d399" opacity="0.85"/> <!-- 영국 제도 -->
            <path d="M840,150 L860,170 L855,195" stroke="#a78bfa" stroke-width="4" fill="none"/> <!-- 일본 열도 -->
            <path d="M830,450 L850,480" stroke="#f472b6" stroke-width="4" fill="none"/> <!-- 뉴질랜드 -->
        </svg>

        <!-- 대륙 및 대양 인터랙티브 마커 (실제 지형 기반 좌표 최적화) -->
        <div class="pin unsolved" data-id="asia" style="top: 30%; left: 70%;">?</div>
        <div class="pin unsolved" data-id="europe" style="top: 24%; left: 46%;">?</div>
        <div class="pin unsolved" data-id="africa" style="top: 50%; left: 45%;">?</div>
        <div class="pin unsolved" data-id="na" style="top: 30%; left: 21%;">?</div>
        <div class="pin unsolved" data-id="sa" style="top: 68%; left: 26%;">?</div>
        <div class="pin unsolved" data-id="oceania" style="top: 72%; left: 78%;">?</div>
        
        <div class="pin unsolved" data-id="pacific1" style="top: 45%; left: 8%;">?</div>
        <div class="pin unsolved" data-id="pacific2" style="top: 45%; left: 91%;">?</div>
        <div class="pin unsolved" data-id="atlantic" style="top: 46%; left: 35%;">?</div>
        <div class="pin unsolved" data-id="indian" style="top: 60%; left: 60%;">?</div>
        <div class="pin unsolved" data-id="arctic" style="top: 8%; left: 50%;">?</div>
        <div class="pin unsolved" data-id="antarctic" style="top: 92%; left: 50%;">?</div>
    </div>

    <!-- Canva 양식 연동 하단 성찰 일지 코너 -->
    <div class="reflection-panel">
        <div class="reflection-title">✏️ 학생 눈으로 내가 만든 도구 살펴보는 성찰일지</div>
        <div class="reflection-q">
            <strong>🤔 오늘 나의 성찰질문:</strong><br>
            "이 대륙과 대양 지도 게임은 처음 학습하는 친구들이 참여했을 때 평면 지도와 지구본의 크기 왜곡 차이를 한눈에 쉽게 이해할 수 있도록 유익하게 구성되어 있는가? 오늘 활동을 통해 깨달은 점을 적어봅시다."[cite: 1]
        </div>
        <textarea id="reflectionText" placeholder="여기에 성찰 기록을 작성하세요... (예: 실제 지형 윤곽선으로 학습해 보니, 늘어난 북극해 바다 모양이나 아프리카 대륙의 진짜 크기 관계가 한눈에 들어와서 신기했습니다.)"></textarea>
        <button class="submit-btn" onclick="saveReflection()">성찰 기록 인쇄 / PDF 저장하기</button>
    </div>

    <!-- 퀴즈 팝업창 -->
    <div class="modal" id="quizModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">탐험 퀴즈</div>
            <div class="guide-box" id="modalGuide">힌트</div>
            <div class="quiz-text" id="modalQuestion">올바른 명칭은 무엇일까요?</div>
            <div class="quiz-hint" id="modalHint">초성</div>
            <div class="choice-container" id="modalChoices"></div>
        </div>
    </div>

    <script>
        const quizData = {
            asia: { title: "대륙 탐험", type: "continent", hint: "ㅇㅅㅇ", ans: "아시아", guide: "💡 유럽의 동쪽에 있으며, 실제 지구상에서 가장 면적이 넓은 거대한 대륙입니다."[cite: 1], choices: ["아시아", "오세아니아", "아프리카", "유럽"] },
            europe: { title: "대륙 탐험", type: "continent", hint: "ㅇㄹ", ans: "유럽", guide: "💡 아시아의 서쪽, 아프리카의 북쪽에 긴밀하게 붙어 있는 대륙입니다."[cite: 1], choices: ["유럽", "아시아", "북아메리카", "남아메리카"] },
            africa: { title: "대륙 탐험 (면적 왜곡 주의!)", type: "continent", hint: "ㅇㅍㄹㅋ", ans: "아프리카", guide: "⚠️ 중요(지도서 410쪽 지침): 평면 지도에선 북아메리카와 크기가 비슷해 보이지만, 실제 입체 지구본으로 보면 아프리카가 훨씬 큽니다!"[cite: 1], choices: ["아프리카", "남아메리카", "북아메리카", "유럽"] },
            na: { title: "대륙 탐험 (면적 왜곡 주의!)", type: "continent", hint: "ㅂㅇㅁㄹㅋ", ans: "북아메리카", guide: "⚠️ 중요: 평면 지도에서는 위쪽 고위도 지역의 실제 모양이 가로로 늘어나 보입니다. 남아메리카의 북쪽에 있습니다."[cite: 1], choices: ["북아메리카", "남아메리카", "아시아", "아프리카"] },
            sa: { title: "대륙 탐험", type: "continent", hint: "ㄴㅇㅁㄹㅋ", ans: "남아메리카", guide: "💡 북아메리카의 남쪽에 삼각형 모양으로 길게 뻗어 있으며, 대서양과 태평양 사이에 위치합니다."[cite: 1], choices: ["남아메리카", "북아메리카", "오세아니아", "아프리카"] },
            oceania: { title: "대륙 탐험", type: "continent", hint: "ㅇㅅㅇㄴㅇ", ans: "오세아니아", guide: "💡 아시아의 남쪽에 독립적으로 위치하며, 6대륙 중 가장 면적이 작은 대륙입니다."[cite: 1], choices: ["오세아니아", "아시아", "유럽", "남아메리카"] },
            pacific1: { title: "대양 탐험", type: "ocean", hint: "ㅌㅍㅇ", ans: "태평양", guide: "💡 아시아 대륙과 아메리카 대륙 사이에 있는 세계에서 가장 넓고 거대한 바다입니다."[cite: 1], choices: ["태평양", "대서양", "인도양", "북극해"] },
            pacific2: { title: "대양 탐험", type: "ocean", hint: "ㅌㅍㅇ", ans: "태평양", guide: "💡 아시아 대륙과 아메리카 대륙 사이에 있는 세계에서 가장 넓고 거대한 바다입니다."[cite: 1], choices: ["태평양", "대서양", "인도양", "북극해"] },
            atlantic: { title: "대양 탐험", type: "ocean", hint: "ㄷㅅㅇ", ans: "대서양", guide: "💡 아메리카 대륙과 유럽, 아프리카 대륙 사이에 끼어 있는 두 번째로 큰 바다입니다."[cite: 1], choices: ["대서양", "태평양", "인도양", "남극해"] },
            indian: { title: "대양 탐험", type: "ocean", hint: "ㅇㄷㅇ", ans: "인도양", guide: "💡 아시아, 아프리카, 오세아니아 대륙 사이에 오목하게 갇혀 있는 세 번째로 큰 바다입니다."[cite: 1], choices: ["인도양", "대서양", "태평양", "북극해"] },
            arctic: { title: "대양 탐험 (지도의 왜곡!)", type: "ocean", hint: "ㅂㄱㅎ", ans: "북극해", guide: "⚠️ 중요: 평면 세계지도 가장 윗부분에 직사각형으로 길게 찢어져 보이지만, 실제로는 북극점 주변을 동그랗게 둘러싼 바다입니다."[cite: 1], choices: ["북극해", "남극해", "대서양", "태평양"] },
            antarctic: { title: "대양 탐험 (지도의 왜곡!)", type: "ocean", hint: "ㄴㄱㅎ", ans: "남극해", guide: "⚠️ 중요: 평면 지도 맨 아래쪽에 엄청나게 길게 표시되지만, 실제로는 남극 대륙을 둥글게 감싸고 있는 독립된 바다입니다."[cite: 1], choices: ["남극해", "북극해", "인도양", "대서양"] }
        };

        let currentScore = 0;
        let activePin = null;

        document.querySelectorAll('.pin').forEach(pin => {
            pin.addEventListener('click', function() {
                const id = this.getAttribute('data-id');
                const data = quizData[id];
                if (!data || !this.classList.contains('unsolved')) return;

                activePin = this;
                document.getElementById('modalTitle').innerText = data.title;
                document.getElementById('modalGuide').innerHTML = data.guide;
                document.getElementById('modalHint').innerText = data.hint;
                
                const choiceContainer = document.getElementById('modalChoices');
                choiceContainer.innerHTML = '';
                
                data.choices.forEach(choice => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.innerText = choice;
                    btn.onclick = () => checkAnswer(choice, data.ans);
                    choiceContainer.appendChild(btn);
                });

                document.getElementById('quizModal').style.display = 'flex';
            });
        });

        function checkAnswer(selected, correct) {
            document.getElementById('quizModal').style.display = 'none';
            
            if (selected === correct) {
                currentScore += 10;
                document.getElementById('score').innerText = currentScore;
                
                const currentId = activePin.getAttribute('data-id');
                if (currentId === 'pacific1' || currentId === 'pacific2') {
                    document.querySelectorAll('[data-id="pacific1"], [data-id="pacific2"]').forEach(p => revealPin(p, quizData[currentId]));
                } else {
                    revealPin(activePin, quizData[currentId]);
                }

                // 만점 완료 시 축죽 시각 효과 활성화
                if (currentScore >= 110) {
                    confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
                    setTimeout(() => { alert("🎉 축하합니다! 실제 지형을 바탕으로 5대양 6대륙 미션을 완벽히 마쳤습니다. 하단의 성찰일지를 마저 기록해 보세요!"); }, 500);
                }
            } else {
                alert("❌ 다시 한 번 지형의 윤곽과 가이드 상자의 힌트를 조합해 보세요!");
            }
        }

        function revealPin(pinElement, data) {
            pinElement.classList.remove('unsolved');
            pinElement.classList.add(data.type);
            pinElement.innerText = data.ans[0];
        }

        function saveReflection() {
            const text = document.getElementById('reflectionText').value;
            if(!text.trim()) {
                alert("성찰 기록 내용을 입력한 후에 PDF 저장을 진행해 주세요.");
                return;
            }
            window.print();
        }
    </script>
</body>
</html>
