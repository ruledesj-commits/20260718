<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5학년 사회 - 세계 대륙과 대양 탐험</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #ff6b6b;
            --bg: #f0f4f8;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .description {
            color: #666;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        /* 지도 컨테이너: 가로세로 비율을 유지하며 반응형으로 작동 */
        .map-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            background: #e0f2fe; /* 바다 느낌의 배경색 */
            border: 4px solid #fff;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* 실제 세계지도 이미지 (대체용 고품질 일러스트 지도) */
        .world-map {
            width: 100%;
            display: block;
            height: auto;
            opacity: 0.9;
        }

        /* 위치 핀 스타일 */
        .marker {
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: var(--secondary);
            border: 3px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: all 0.2s ease-in-out;
            animation: pulse 2s infinite;
        }

        .marker:hover {
            transform: translate(-50%, -50%) scale(1.3);
            background-color: #22c55e; /* 호버 시 초록색으로 변경 */
        }

        /* 대양(바다)용 핀은 파란색 계열로 구분 */
        .marker.ocean {
            background-color: var(--primary);
        }

        /* 툴팁 (마우스 올렸을 때 이름 표시) */
        .tooltip {
            visibility: hidden;
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85rem;
            white-space: nowrap;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .marker:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 107, 107, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0); }
        }
    </style>
</head>
<body>

    <h1>🌍 대륙과 대양의 위치를 찾아라!</h1>
    <p class="description">지도 위의 반짝이는 핀에 마우스를 올려 대륙과 대양의 이름을 확인해 보세요.</p>

    <div class="map-container">
        <!-- SVG로 간단히 그린 가상 세계 지도 배치 (실제 이미지 링크가 깨지는 것을 방지) -->
        <svg class="world-map" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
            <rect width="900" height="500" fill="#bae6fd"/>
            <!-- 아시아 대륙 가이드 라인 -->
            <path d="M500,100 Q650,80 750,150 T650,350 T500,250 Z" fill="#fef08a" stroke="#fef08a"/>
            <!-- 유럽 -->
            <path d="M400,100 Q480,80 500,150 T450,250 Z" fill="#bbf7d0" stroke="#bbf7d0"/>
            <!-- 아프리카 -->
            <path d="M400,220 Q500,250 520,380 T400,420 Z" fill="#fed7aa" stroke="#fed7aa"/>
            <!-- 북아메리카 -->
            <path d="M100,80 Q250,100 300,200 T200,300 Z" fill="#fbcfe8" stroke="#fbcfe8"/>
            <!-- 남아메리카 -->
            <path d="M200,280 Q300,350 250,480 T180,350 Z" fill="#ddd6fe" stroke="#ddd6fe"/>
            <!-- 오세아니아 -->
            <path d="M700,330 Q800,350 780,420 T680,380 Z" fill="#fecdd3" stroke="#fecdd3"/>
        </svg>

        <!-- 6대륙 핀 배치 (percentage 기반으로 반응형 위치 설정) -->
        <div class="marker" style="top: 30%; left: 65%;">
            <div class="tooltip">아시아 (ㅇㅅㅇ)</div>
        </div>
        <div class="marker" style="top: 26%; left: 48%;">
            <div class="tooltip">유럽 (ㅇㄹ)</div>
        </div>
        <div class="marker" style="top: 55%; left: 47%;">
            <div class="tooltip">아프리카 (ㅇㅍㄹㅋ)</div>
        </div>
        <div class="marker" style="top: 32%; left: 22%;">
            <div class="tooltip">북아메리카 (ㅂㅇㅁㄹㅋ)</div>
        </div>
        <div class="marker" style="top: 68%; left: 28%;">
            <div class="tooltip">남아메리카 (ㄴㅇㅁㄹㅋ)</div>
        </div>
        <div class="marker" style="top: 72%; left: 80%;">
            <div class="tooltip">오세아니아 (ㅇㅅㅇㄴㅇ)</div>
        </div>

        <!-- 5대양 핀 배치 -->
        <div class="marker ocean" style="top: 45%; left: 8%;">
            <div class="tooltip">태평양 (ㅌㅍㅇ)</div>
        </div>
        <div class="marker ocean" style="top: 45%; left: 92%;">
            <div class="tooltip">태평양 (ㅌㅍㅇ)</div>
        </div>
        <div class="marker ocean" style="top: 48%; left: 36%;">
            <div class="tooltip">대서양 (ㄷㅅㅇ)</div>
        </div>
        <div class="marker ocean" style="top: 60%; left: 62%;">
            <div class="tooltip">인도양 (ㅇㄷㅇ)</div>
        </div>
        <div class="marker ocean" style="top: 8%; left: 50%;">
            <div class="tooltip">북극해 (ㅂㄱㅎ)</div>
        </div>
        <div class="marker ocean" style="top: 90%; left: 50%;">
            <div class="tooltip">남극해 (ㄴㄱㅎ)</div>
        </div>
    </div>

</body>
</html>
