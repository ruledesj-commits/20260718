<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5학년 사회 - 대륙과 대양 탐험 교구 (지도서 410쪽 반영)</title>
    <style>
        :root {
            --ocean-color: #2563eb;
            --continent-color: #ea580c;
            --bg-light: #f8fafc;
            --slate-800: #1e293b;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 { color: var(--slate-800); margin: 0 0 8px 0; font-size: 1.8rem; }
        .subtitle { color: #64748b; margin: 0; font-size: 1rem; }

        /* 점수판 및 대화 상자 */
        .status-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #334155;
        }
        .score-box { background: #e2e8f0; padding: 6px 16px; border-radius: 20px; }

        /* 지도 보드 */
        .map-board {
            position: relative;
            width: 100%;
            max-width: 960px;
            aspect-ratio: 960 / 540;
            background-color: #bae6fd;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            overflow: hidden;
            border: 4px solid #ffffff;
        }

        .base-map { width: 100%; height: 100%; display: block; }

        /* 반응형 핀 */
        .pin {
            position: absolute;
            width: 32px;
            height: 32px;
            border: 3px solid #ffffff;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: all 0.2s ease;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .pin.unsolved { background-color: #64748b !important; animation: blink 1.5s infinite; }
        .pin.continent { background-color: var(--continent-color); }
        .pin.ocean { background-color: var(--ocean-color); }
        .pin:hover { transform: translate(-50%, -50%) scale(1.2); }

        /* 지도서 기반 퀴즈 모달 팝업 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 10;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            text-align: center;
            position: relative;
        }
        .modal-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 10px; color: #0f172a; }
        
        /* 지도서 핵심: 왜곡 주의 판정 상자 */
        .guide-box {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #166534;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .quiz-text { font-size: 1.1rem; font-weight: bold; color: #2563eb; margin-bottom: 15px; }
        .quiz-hint { font-size: 1.4rem; letter-spacing: 4px; font-weight: bold; color: #dc2626; margin-bottom: 20px; }
        
        .choice-container { display: flex; flex-direction: column; gap: 10px; }
        .choice-btn {
            background: #f1f5f9;
            border: 2px solid #cbd5e1;
            padding: 12px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .choice-btn:hover { background: #e2e8f0; border-color: #94a3b8; }

        @keyframes blink {
            0% { box-shadow: 0 0 0 0 rgba(100, 116, 139, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(100, 116, 139, 0); }
            100% { box-shadow: 0 0 0 0 rgba(100, 116, 139, 0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>🗺️ 5학년 사회 - 세계 대륙과 대양 탐험</h1>
        <p class="subtitle">회색 핀을 클릭하고, 주변 관계와 지도 왜곡 문제를 고려해 초성 퀴즈를 풀어보세요!</p>
    </header>

    <div class="status-bar">
        <div class="score-box">탐험 점수: <span id="score">0</span> / 110점</div>
    </div>

    <div class="map-board">
        <svg class="base-map" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg">
            <rect width="960" height="540" fill="#bae6fd"/>
            <line x1="0" y1="270" x2="960" y2="270" stroke="#7dd3fc" stroke-width="2" stroke-dasharray="4"/>
            <!-- 6대륙 아웃라인 일러스트 맵 레이아웃 -->
            <path d="M120,80 C180,60 320,120 340,180 C320,240 280,260 220,260 C180,220 100,160 120,80 Z" fill="#f87171" opacity="0.8"/>
            <path d="M220,260 C260,280 340,320 320,380 C300,440 280,500 240,520 C220,460 200,340 220,260 Z" fill="#fbbf24" opacity="0.8"/>
            <path d="M420,120 C460,80 520,80 540,140 C520,180 460,200 420,160 Z" fill="#34d399" opacity="0.8"/>
            <path d="M420,170 C480,160 560,200 560,260 C540,340 500,420 460,450 C420,380 380,280 420,170 Z" fill="#fb923c" opacity="0.8"/>
            <path d="M540,140 C600,60 820,80 880,180 C840,280 720,360 620,320 C600,240 540,200 540,140 Z" fill="#a78bfa" opacity="0.8"/>
            <path d="M740,340 C800,330 860,360 840,420 C780,440 720,400 740,340 Z" fill="#f472b6" opacity="0.8"/>
        </svg>

        <!-- 지도 위 핀 요소 스크립트 제어용 데이터 연동 -->
        <div class="pin unsolved" data-id="asia" style="top: 32%; left: 72%;">?</div>
        <div class="pin unsolved" data-id="europe" style="top: 24%; left: 49%;">?</div>
        <div class="pin unsolved" data-id="africa" style="top: 52%; left: 47%;">?</div>
        <div class="pin unsolved" data-id="na" style="top: 30%; left: 23%;">?</div>
        <div class="pin unsolved" data-id="sa" style="top: 68%; left: 28%;">?</div>
        <div class="pin unsolved" data-id="oceania" style="top: 72%; left: 81%;">?</div>
        
        <div class="pin unsolved" data-id="pacific1" style="top: 45%; left: 9%;">?</div>
        <div class="pin unsolved" data-id="pacific2" style="top: 45%; left: 91%;">?</div>
        <div class="pin unsolved" data-id="atlantic" style="top: 46%; left: 36%;">?</div>
        <div class="pin unsolved" data-id="indian" style="top: 60%; left: 65%;">?</div>
        <div class="pin unsolved" data-id="arctic" style="top: 8%; left: 50%;">?</div>
        <div class="pin unsolved" data-id="antarctic" style="top: 92%; left: 50%;">?</div>
    </div>

    <!-- 퀴즈 모달 시스템 -->
    <div class="modal" id="quizModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">대륙 탐험 퀴즈</div>
            <div class="guide-box" id="modalGuide">지도서 핵심 내용 가이드</div>
            <div class="quiz-text" id="modalQuestion">이곳의 올바른 명칭은 무엇일까요?</div>
            <div class="quiz-hint" id="modalHint">초성</div>
            <div class="choice-container" id="modalChoices"></div>
        </div>
    </div>

    <script>
        // 지도서 410쪽 탐구 지침 완벽 반영 데이터 셋
        const quizData = {
            asia: { title: "대륙 탐험", type: "continent", hint: "ㅇㅅㅇ", ans: "아시아", guide: "💡 유럽의 동쪽에 있으며, 세계에서 가장 큰 대륙입니다.", choices: ["아시아", "오세아니아", "아프리카", "유럽"] },
            europe: { title: "대륙 탐험", type: "continent", hint: "ㅇㄹ", ans: "유럽", guide: "💡 아시아의 서쪽, 아프리카의 북쪽에 위치해 있습니다.", choices: ["유럽", "아시아", "북아메리카", "남아메리카"] },
            africa: { title: "대륙 탐험(면적 왜곡 주의!)", type: "continent", hint: "ㅇㅍㄹㅋ", ans: "아프리카", guide: "⚠️ 중요: 평면 지도에서는 북아메리카와 비슷해 보이지만, 실제 지구본으로 보면 훨씬 큰 대륙입니다!", choices: ["아프리카", "남아메리카", "북아메리카", "유럽"] },
            na: { title: "대륙 탐험(면적 왜곡 주의!)", type: "continent", hint: "ㅂㅇㅁㄹㅋ", ans: "북아메리카", guide: "⚠️ 중요: 평면 지도에서는 아주 거대해 보이지만 고위도 왜곡이 포함되어 있습니다. 남아메리카의 북쪽에 있습니다.", choices: ["북아메리카", "남아메리카", "아시아", "아프리카"] },
            sa: { title: "대륙 탐험", type: "continent", hint: "ㄴㅇㅁㄹㅋ", ans: "남남아메리카", ansKey: "남아메리카", guide: "💡 북아메리카의 남쪽에 있으며, 대서양과 태평양 사이에 뻗어 있습니다.", choices: ["남아메리카", "북아메리카", "오세아니아", "아프리카"] },
            oceania: { title: "대륙 탐험", type: "continent", hint: "ㅇㅅㅇㄴㅇ", ans: "오세아니아", guide: "💡 아시아의 남쪽에 위치하며, 세계에서 가장 작은 대륙입니다.", choices: ["오세아니아", "아시아", "유럽", "남아메리카"] },
            pacific1: { title: "대양 탐험", type: "ocean", hint: "ㅌㅍㅇ", ans: "태평양", guide: "💡 아시아, 오세아니아, 아메리카 사이에 있는 가장 넓은 바다입니다.", choices: ["태평양", "대서양", "인도양", "북극해"] },
            pacific2: { title: "대양 탐험", type: "ocean", hint: "ㅌㅍㅇ", ans: "태평양", guide: "💡 아시아, 오세아니아, 아메리카 사이에 있는 가장 넓은 바다입니다.", choices: ["태평양", "대서양", "인도양", "북극해"] },
            atlantic: { title: "대양 탐험", type: "ocean", hint: "ㄷㅅㅇ", ans: "대서양", guide: "💡 아메리카 대륙과 유럽, 아프리카 대륙 사이에 있는 두 번째로 큰 바다입니다.", choices: ["대서양", "태평양", "인도양", "남극해"] },
            indian: { title: "대양 탐험", type: "ocean", hint: "ㅇㄷㅇ", ans: "인도양", guide: "💡 아시아, 아프리카, 오세아니아 대륙 사이에 갇혀 있는 세 번째로 큰 바다입니다.", choices: ["인도양", "대서양", "태평양", "북극해"] },
            arctic: { title: "대양 탐험(도법 왜곡 주의!)", type: "ocean", hint: "ㅂㄱㅎ", ans: "북극해", guide: "⚠️ 중요: 평면 지도 양 끝 상단에 길게 늘어져 왜곡되어 보이지만, 실제로는 북극 주변을 둘러싼 바다입니다.", choices: ["북극해", "남극해", "대서양", "태평양"] },
            antarctic: { title: "대양 탐험(도법 왜곡 주의!)", type: "ocean", hint: "ㄴㄱㅎ", ans: "남극해", guide: "⚠️ 중요: 평면 세계지도 맨 아래에 길게 왜곡되어 표시되지만, 실제로는 남극 대륙을 둥글게 감싸고 있는 바다입니다.", choices: ["남극해", "북극해", "인도양", "대서양"] }
        };

        let currentScore = 0;
        let activePin = null;

        document.querySelectorAll('.pin').forEach(pin => {
            pin.addEventListener('click', function() {
                const id = this.getAttribute('data-id');
                const data = quizData[id];
                if (!data || !this.classList.contains('unsolved')) return;

                activePin = this;
                
                // 모달 내용 주입
                document.getElementById('modalTitle').innerText = data.title;
                document.getElementById('modalGuide').innerHTML = data.guide;
                document.getElementById('modalHint').innerText = data.hint;
                
                // 선택지 버튼 생성
                const choiceContainer = document.getElementById('modalChoices');
                choiceContainer.innerHTML = '';
                
                data.choices.forEach(choice => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.innerText = choice;
                    btn.onclick = () => checkAnswer(choice, data.ansKey || data.ans);
                    choiceContainer.appendChild(btn);
                });

                document.getElementById('quizModal').style.display = 'flex';
            });
        });

        function checkAnswer(selected, correct) {
            document.getElementById('quizModal').style.display = 'none';
            
            if (selected === correct) {
                alert("🎉 정답입니다! 지도서 탐구 내용을 완벽하게 이해했군요!");
                currentScore += 10;
                document.getElementById('score').innerText = currentScore;
                
                // 태평양 동/서 연동 처리
                const currentId = activePin.getAttribute('data-id');
                if (currentId === 'pacific1' || currentId === 'pacific2') {
                    document.querySelectorAll('[data-id="pacific1"], [data-id="pacific2"]').forEach(p => revealPin(p, quizData[currentId]));
                } else {
                    revealPin(activePin, quizData[currentId]);
                }
            } else {
                alert("❌ 아쉬워요! 가이드 상자의 힌트를 읽고 다시 도전해 보세요.");
            }
        }

        function revealPin(pinElement, data) {
            pinElement.classList.remove('unsolved');
            pinElement.classList.add(data.type);
            pinElement.innerText = data.ans[0]; // 첫 글자 노출 (아, 태, 대 등)
            pinElement.style.fontSize = "0.75rem";
        }
    </script>
</body>
</html>
